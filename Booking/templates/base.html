{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facility Booking System</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="{% static 'css/style.css' %}?v=1.0.1" rel="stylesheet">

    <!-- Flatpickr (For 12-hour AM/PM Time Picker) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>

<body>

    <!-- Interactive Glassmorphism Navbar -->
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <i class="fa-solid fa-building-circle-check"></i>
            FacilityBooking
        </a>
        <div class="nav-links">
            <a href="/hall/"><i class="fa-solid fa-people-roof"></i> Hall</a>
            <a href="/studio/"><i class="fa-solid fa-camera"></i> Studio</a>
            <a href="/lounge/"><i class="fa-solid fa-mug-hot"></i> Lounge</a>

            <!-- Separator -->
            <div
                style="width: 1px; height: 24px; background: rgba(255, 255, 255, 0.2); margin: 0 0.5rem; align-self: center;">
            </div>

            <!-- Authentication Links -->
            {% if user.is_authenticated %}
            <a href="/dashboard/" style="color: #6ee7b7; border: 1px solid rgba(110, 231, 183, 0.2);"><i class="fa-solid fa-calendar-check"></i> Dashboard</a>
            <span style="align-self: center; color: #cbd5e1; font-size: 0.95rem; margin: 0 0.5rem;"><i
                    class="fa-regular fa-circle-user"></i> {{ user.username }}</span>
            <a href="/logout/" style="color: #f87171; border: 1px solid rgba(248, 113, 113, 0.2);"><i
                    class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
            {% else %}
            <a href="/login/"><i class="fa-solid fa-arrow-right-to-bracket"></i> Login</a>
            <a href="/register/" style="background: var(--primary); color: white;"><i class="fa-solid fa-user-plus"></i>
                Register</a>
            {% endif %}
        </div>
    </nav>

    <!-- Main Content Area -->
    <main>
        <div class="content-card">
            {% block content %}
            <!-- Page-specific content goes here -->
            {% endblock %}
        </div>
    </main>

    <!-- Interactive Navigation Script -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <!-- Custom JS -->
    <script src="{% static 'js/main.js' %}?v=4.0"></script>
</body>

</html>
